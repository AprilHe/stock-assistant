name: Stock Report

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  # Automatic schedule: Mon–Fri at 08:30 AM New York time (pre-market).
  # GitHub Actions cron runs in UTC. New York is UTC-5 (EST, Nov–Mar) or UTC-4 (EDT, Mar–Nov).
  # 13:30 UTC = 8:30 AM EST (winter) | 9:30 AM EDT (summer — fires right at market open).
  # To target exactly 8:30 AM year-round, switch to 12:30 UTC in summer manually,
  # or just leave 13:30 UTC which always delivers before or at the opening bell.
  schedule:
    - cron: "30 13 * * 1-5"

  # Manual trigger: run any time with optional overrides from the GitHub UI
  workflow_dispatch:
    inputs:
      watchlist:
        description: "Tickers (comma-separated, e.g. AAPL,NVDA,^GSPC)"
        required: false
        default: ""
      strategies:
        description: "Strategies (e.g. breakout,pullback,commodity_macro)"
        required: false
        default: ""
      language:
        description: "Report language: en or zh"
        required: false
        default: "en"
        type: choice
        options:
          - en
          - zh
      sections:
        description: "Sections: watchlist / watchlist,market / watchlist,market,commodity"
        required: false
        default: "watchlist,market"
      send_telegram:
        description: "Send Telegram notification?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      notification_mode:
        description: "Bot notification mode: simple or full"
        required: false
        default: "simple"
        type: choice
        options:
          - simple
          - full

# ─── Environment defaults ────────────────────────────────────────────────────
# Priority: workflow_dispatch input → repository variable → hard-coded default
env:
  WATCHLIST: ${{ inputs.watchlist || vars.WATCHLIST || '^GSPC,^IXIC,BTC-USD,GC=F,CL=F' }}
  STRATEGIES: ${{ inputs.strategies || vars.STRATEGIES || 'breakout' }}
  REPORT_LANGUAGE: ${{ inputs.language || vars.REPORT_LANGUAGE || 'en' }}
  REPORT_SECTIONS: ${{ inputs.sections || vars.REPORT_SECTIONS || 'watchlist,market' }}
  SEND_TELEGRAM: ${{ inputs.send_telegram || 'false' }}
  BOT_NOTIFICATION_MODE: ${{ inputs.notification_mode || vars.BOT_NOTIFICATION_MODE || 'simple' }}
  LLM_MODEL: ${{ vars.LLM_MODEL || '' }}

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  generate-report:
    name: Generate & Deliver Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          # LLM — set at least one API key matching your LLM_MODEL choice
          LLM_MODEL: ${{ env.LLM_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # News
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Report settings (from env block above)
          WATCHLIST: ${{ env.WATCHLIST }}
          STRATEGIES: ${{ env.STRATEGIES }}
          REPORT_LANGUAGE: ${{ env.REPORT_LANGUAGE }}
          REPORT_SECTIONS: ${{ env.REPORT_SECTIONS }}
          SEND_TELEGRAM: ${{ env.SEND_TELEGRAM }}
          BOT_NOTIFICATION_MODE: ${{ env.BOT_NOTIFICATION_MODE }}
        run: python scripts/run_report.py

      # Upload saved report files (.md + .json) as a downloadable artifact
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-report-${{ github.run_id }}
          path: reports/github-actions/
          retention-days: 30
